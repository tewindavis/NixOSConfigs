# VERIFIED: This config is manually managed by Gemini (2026-06-07)
# It uses the latest v0.55+ "Block Syntax" for maximum stability.

monitor = ,2256x1504@60,auto,1.17

xwayland {
  force_zero_scaling = true
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

general {
    gaps_in = 2
    gaps_out = 3
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(9ece6aee) 45deg
    col.inactive_border = rgba(1a1a20aa)
    layout = dwindle
}

decoration {
    rounding = 6
    active_opacity = 0.9
    inactive_opacity = 0.8
    blur {
        enabled = true
        size = 1
        passes = 1
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# New v0.55 syntax for gestures
gesture = 3, horizontal, workspace

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# Window Rules (Unified v0.55+ "Block Syntax")
windowrule {
    name = ghostty-rice
    match:class = ^(ghostty)$
    opacity = 0.95 0.85
    blur = on
}

# Bindings
bind = SUPER, T, exec, ghostty
bind = SUPER, Return, exec, ghostty
bind = SUPER, E, exec, thunar
bind = SUPER, Space, exec, wofi --show drun
bind = SUPER_SHIFT, L, exec, hyprlock
bind = SUPER, W, exec, cycle-wallpaper
bind = SUPER, R, exec, hyprsunset --temperature 2500
bind = SUPER_SHIFT, R, exec, hyprsunset --identity
bind = SUPER_SHIFT, E, exit
bind = SUPER, X, killactive

# Navigation
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER_SHIFT, 1, movetoworkspace, 1
bind = SUPER_SHIFT, 2, movetoworkspace, 2
bind = SUPER_SHIFT, 3, movetoworkspace, 3
bind = SUPER_SHIFT, 4, movetoworkspace, 4
bind = SUPER_SHIFT, 5, movetoworkspace, 5
bind = SUPER_SHIFT, 6, movetoworkspace, 6
bind = SUPER_SHIFT, 7, movetoworkspace, 7
bind = SUPER_SHIFT, 8, movetoworkspace, 8
bind = SUPER_SHIFT, 9, movetoworkspace, 9

# Mouse Bindings
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Media Keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Autostart
exec-once = spice-vdagent
exec-once = nm-applet --indicator
exec-once = hypridle
exec-once = waybar
exec-once = hyprpaper
exec-once = hyprsunset --temperature 3500
exec-once = setup-wallpapers
exec-once = cycle-wallpaper
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Tokyonight-Dark'
